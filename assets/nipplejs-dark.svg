<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 80">
  <defs>
    <linearGradient id="front" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <!-- Back circle -->
  <circle cx="40" cy="40" r="36" fill="#6366f1" opacity="0.25"/>
